name: My Mastodon Email Digest 
on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
jobs:
  update:
    name: digest
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@master
        with:
          ref: main
      - name: python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: python things
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: run digest
        env:
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
          MASTODON_BASE_URL: ${{ secrets.MASTODON_BASE_URL }}
          MASTODON_USERNAME: ${{ secrets.MASTODON_USERNAME }}
          MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
          MAIL_SERVER_PORT: ${{ secrets.MAIL_SERVER_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_DESTINATION: ${{ secrets.MAIL_DESTINATION }}
        run: |
          python run.py -n 24 -s FriendWeighted -t lax
